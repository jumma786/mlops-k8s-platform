apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mlops-prediction-api
  namespace: mlops
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: mlops-prediction-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mlops-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  mlops-dashboard.json: |
    {
      "title": "MLOps Platform Dashboard",
      "panels": [
        {"title": "Prediction Requests/sec", "type": "graph"},
        {"title": "P99 Latency", "type": "graph"},
        {"title": "Positive Prediction Rate", "type": "stat"},
        {"title": "Model AUC", "type": "stat"}
      ]
    }
