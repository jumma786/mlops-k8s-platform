apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-prediction-api
  namespace: mlops
  labels:
    app: mlops-prediction-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mlops-prediction-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mlops-prediction-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: prediction-api
          image: jumma786/mlops-prediction-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: ARTIFACTS_DIR
              value: /app/artifacts
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
